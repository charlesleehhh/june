name: Auto Deploy Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GIT_TOKEN: ${{ secrets.GIT_PUSH_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          debug: true
          script: |
            mkdir -p /opt/data/charleslee/github/june
            cd /opt/data/charleslee/github/june
            if [ ! -d .git ]; then
              git init
            fi
            # 运行时从环境变量读取token，yml文件无明文密钥
            git remote set-url origin https://charlesleehhh:${GIT_TOKEN}@github.com/charlesleehhh/june.git
            git fetch origin
            git reset --hard origin/main