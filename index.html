<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍜 今天吃什么</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b6b;
            --secondary: #feca57;
            --accent: #48dbfb;
            --green: #1dd1a1;
            --purple: #a55eea;
            --bg-dark: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .food-particle {
            position: absolute;
            font-size: 40px;
            opacity: 0.1;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
            }
            50% {
                transform: translateY(-100px) rotate(180deg);
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .emoji-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .result-card {
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-card:hover {
            border-color: rgba(255, 107, 107, 0.4);
            box-shadow: 0 20px 60px rgba(255, 107, 107, 0.2);
        }

        .result-card.spinning {
            animation: spin-card 0.6s ease-in-out;
        }

        @keyframes spin-card {
            0% { transform: rotate(-3deg) scale(0.95); }
            50% { transform: rotate(3deg) scale(1.02); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .food-emoji {
            font-size: 120px;
            margin-bottom: 20px;
            animation: food-bounce 1s ease-in-out;
        }

        @keyframes food-bounce {
            0% { transform: scale(0) rotate(-180deg); }
            60% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .food-name {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .food-description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .button-container {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 20px 48px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #1a1a2e;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(255, 107, 107, 0.5);
        }

        .btn-primary:active {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .history-section {
            margin-top: 60px;
            width: 100%;
        }

        .history-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-align: center;
        }

        .history-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .history-item {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .history-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .history-emoji {
            font-size: 24px;
        }

        .placeholder {
            color: var(--text-secondary);
            font-size: 20px;
        }

        .placeholder-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 36px;
            }

            .emoji-icon {
                font-size: 70px;
            }

            .food-emoji {
                font-size: 80px;
            }

            .food-name {
                font-size: 32px;
            }

            .result-card {
                padding: 40px 24px;
            }

            .btn {
                padding: 16px 36px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="container">
        <div class="header">
            <div class="emoji-icon">🍽️</div>
            <h1>今天吃什么</h1>
            <p class="subtitle">选择困难？让我来帮你决定！</p>
        </div>

        <div class="result-card" id="resultCard">
            <div class="placeholder-emoji">🤔</div>
            <div class="placeholder">点击下方按钮，看看今天吃什么</div>
        </div>

        <div class="button-container">
            <button class="btn btn-primary" id="randomBtn">
                <span>🎲</span>
                随机选择
            </button>
            <button class="btn btn-secondary" id="clearHistoryBtn">
                <span>🗑️</span>
                清空历史
            </button>
        </div>

        <div class="history-section">
            <h3 class="history-title">📜 最近吃过</h3>
            <div class="history-list" id="historyList">
                <div style="color: var(--text-secondary); font-size: 14px;">还没有历史记录</div>
            </div>
        </div>
    </div>

    <script>
        const foods = [
            { name: '火锅', emoji: '🍲', description: '热气腾腾，麻辣鲜香' },
            { name: '烧烤', emoji: '🍢', description: '炭火烤制，香气四溢' },
            { name: '披萨', emoji: '🍕', description: '芝士拉丝，美味无比' },
            { name: '汉堡', emoji: '🍔', description: '快餐经典，饱腹之选' },
            { name: '寿司', emoji: '🍣', description: '新鲜美味，日式风情' },
            { name: '拉面', emoji: '🍜', description: '浓郁汤底，Q弹面条' },
            { name: '炒饭', emoji: '🍛', description: '粒粒分明，香气扑鼻' },
            { name: '炸鸡', emoji: '🍗', description: '外酥里嫩，金黄酥脆' },
            { name: '饺子', emoji: '🥟', description: '皮薄馅大，传统美味' },
            { name: '包子', emoji: '🥡', description: '松软可口，馅料丰富' },
            { name: '米线', emoji: '🍜', description: '爽滑劲道，汤鲜味美' },
            { name: '麻辣烫', emoji: '🌶️', description: '麻辣过瘾，欲罢不能' },
            { name: '沙拉', emoji: '🥗', description: '清爽健康，减脂必备' },
            { name: '三明治', emoji: '🥪', description: '简单方便，营养均衡' },
            { name: '牛排', emoji: '🥩', description: '肉质鲜嫩，高端之选' },
            { name: '烤鱼', emoji: '🐟', description: '外焦里嫩，香味浓郁' },
            { name: '冒菜', emoji: '🍲', description: '一个人的火锅' },
            { name: '黄焖鸡', emoji: '🍗', description: '汤汁浓郁，下饭神器' },
            { name: '螺蛳粉', emoji: '🍜', description: '臭香臭香，越吃越香' },
            { name: '煎饼果子', emoji: '🌯', description: '早餐首选，香酥可口' },
            { name: '肉夹馍', emoji: '🌮', description: '肥而不腻，馍脆肉香' },
            { name: '麻辣烫', emoji: '🍢', description: '想吃什么煮什么' },
            { name: '麻辣香锅', emoji: '🍲', description: '香辣过瘾，种类丰富' },
            { name: '烤肉', emoji: '🥓', description: '滋滋作响，大口吃肉' },
            { name: '咖喱饭', emoji: '🍛', description: '浓郁咖喱，配饭一绝' },
            { name: '意面', emoji: '🍝', description: 'Q弹面条，酱料香浓' },
            { name: '粥', emoji: '🥣', description: '清淡养胃，暖心暖胃' },
            { name: '便当', emoji: '🍱', description: '荤素搭配，营养丰富' },
            { name: '小龙虾', emoji: '🦐', description: '麻辣鲜香，夜宵之王' },
            { name: '螃蟹', emoji: '🦀', description: '肥美鲜嫩，金秋美味' }
        ];

        let history = [];
        let lastFood = null;

        function createBackgroundParticles() {
            const container = document.getElementById('bgAnimation');
            const foodEmojis = ['🍕', '🍔', '🍟', '🌭', '🍿', '🧂', '🥓', '🍳', '🥞', '🧇', '🧀', '🥗', '🍝', '🥪', '🌮', '🌯', '🍲', '🍜', '🍛', '🍣', '🍱', '🥘', '🥙'];
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'food-particle';
                particle.textContent = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        function getRandomFood() {
            let food;
            do {
                food = foods[Math.floor(Math.random() * foods.length)];
            } while (food === lastFood && foods.length > 1);
            lastFood = food;
            return food;
        }

        function showResult(food) {
            const card = document.getElementById('resultCard');
            card.classList.add('spinning');
            
            setTimeout(() => {
                card.innerHTML = `
                    <div class="food-emoji">${food.emoji}</div>
                    <div class="food-name">${food.name}</div>
                    <div class="food-description">${food.description}</div>
                `;
                card.classList.remove('spinning');
            }, 300);
        }

        function addToHistory(food) {
            history.unshift(food);
            if (history.length > 8) {
                history.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (history.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); font-size: 14px;">还没有历史记录</div>';
                return;
            }
            
            container.innerHTML = history.map(food => `
                <div class="history-item">
                    <span class="history-emoji">${food.emoji}</span>
                    <span>${food.name}</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        document.getElementById('randomBtn').addEventListener('click', () => {
            const food = getRandomFood();
            showResult(food);
            addToHistory(food);
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);

        createBackgroundParticles();
    </script>
</body>
</html>
